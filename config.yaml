settings:
  source_repo: "urunc-dev/urunc"
  refresh_interval: 60
  max_runs_per_workflow: 20

# notify logic
notify:
  enabled: false
  target_repo: "urunc-dev/ci-dashboard"
  label: "ci-failure"

log_analysis:
  max_signals_per_job: 40

  # Lines containing these patterns are ignored before analysis.
  noise_patterns:
    - "sudo process started"
    - "/usr/lib/gcc/"
    - "/usr/bin/gcc"
    - "gcc_fatalf.c"
    - "-werror"
    - "/opt/hostedtoolcache/"
    - "arguments: ["
    - "cc1,"
    - "gmt:sudo process started"

  # Lower priority number = more important
  categories:
    - name: "Crash / Timeout"
      priority: 1
      patterns:
        - "panic:"
        - "test timed out"
        - "all goroutines are asleep"
        - "deadlock"
        - "segmentation violation"

    - name: "Network Failure"
      priority: 2
      patterns:
        - "connection reset by peer"
        - "i/o timeout"
        - "tls handshake timeout"
        - "no route to host"
        - "temporary failure in name resolution"
        - "context deadline exceeded"

    - name: "Test Failure"
      priority: 3
      patterns:
        - "fail\t"
        - "--- fail:"
        - "failing specs"
        - "expected"
        - "received"

    - name: "Build Failure"
      priority: 4
      patterns:
        - "make: ***"
        - "exit status"
        - "process completed with exit code"
        - "##[error]"
        - "compilation terminated"

    - name: "Fatal Runtime Error"
      priority: 5
      patterns:
        - "level=fatal"
        - "fatal msg="
        - "failed to copy"
        - "fatal: "

workflows:
  - name: "add-git-trailers"
